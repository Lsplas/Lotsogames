<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plaicraft Fullscreen</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Removes scrollbars */
        }
        #plaicraft-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe 
        id="plaicraft-frame"
        src="https://plaicraft.ai/" 
        allow="autoplay; fullscreen; microphone; camera"
        allowfullscreen>
    </iframe>
</body>
</html>
