<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabpack 3D Movement Game</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; }
        #instructions {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: rgba(0,0,0,0.7); color: white; cursor: pointer; z-index: 10;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; background-color: white; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 5;
        }
        h1 { font-size: 48px; margin-bottom: 10px; text-shadow: 2px 2px 0 #000; }
        p { font-size: 20px; text-align: center; line-height: 1.5; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="instructions">
        <h1>Grabpack Game</h1>
        <p>Click to start playing<br/>
        <b>W, A, S, D</b> = Move<br/>
        <b>SPACE</b> = Jump<br/>
        <b>Mouse</b> = Look Around</p>
    </div>
    <div id="crosshair"></div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

        // --- 1. SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue background
        scene.fog = new THREE.Fog(0x87CEEB, 0, 750);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.y = 10; // Player height

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- 2. LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(100, 200, 50);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- 3. ENVIRONMENT (Ground & Walls) ---
        // Ground
        const floorGeometry = new THREE.PlaneGeometry(2000, 2000, 100, 100);
        const floorMaterial = new THREE.MeshLambertMaterial({ color: 0x228B22 }); // Grass Green
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Grid helper for better depth perception
        const gridHelper = new THREE.GridHelper(2000, 100, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // --- 4. LOAD THE GRABPACK (Without altering the files) ---
        // We add the Grabpack directly to the CAMERA so it moves with your head.
        scene.add(camera); 
        
        const mtlLoader = new MTLLoader();
        mtlLoader.load('obj.mtl', function (materials) {
            materials.preload();
            const objLoader = new OBJLoader();
            objLoader.setMaterials(materials);
            
            objLoader.load('tinker.obj', function (object) {
                // Tinkercad models are usually massive and uncentered. 
                // These numbers scale it down and position it like a First-Person weapon.
                // You can change these numbers if it looks too big/small or off-screen.
                object.scale.set(0.1, 0.1, 0.1); 
                
                // Position: (X = right/left, Y = up/down, Z = forward/backward)
                object.position.set(3, -4, -8); 
                
                // Rotation (to face forward)
                object.rotation.set(0, Math.PI, 0); 
                
                // Enable shadows for the grabpack
                object.traverse(function(child) {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                camera.add(object); // Attaches grabpack to your view!
            });
        });

        // --- 5. PLAYER CONTROLS & PHYSICS ---
        const controls = new PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');

        instructions.addEventListener('click', function () {
            controls.lock(); // Locks the mouse to the game
        });

        controls.addEventListener('lock', function () {
            instructions.style.display = 'none';
        });

        controls.addEventListener('unlock', function () {
            instructions.style.display = 'flex';
        });

        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let canJump = false;

        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        // Keyboard Inputs
        document.addEventListener('keydown', function (event) {
            switch (event.code) {
                case 'ArrowUp':
                case 'KeyW': moveForward = true; break;
                case 'ArrowLeft':
                case 'KeyA': moveLeft = true; break;
                case 'ArrowDown':
                case 'KeyS': moveBackward = true; break;
                case 'ArrowRight':
                case 'KeyD': moveRight = true; break;
                case 'Space':
                    if (canJump === true) velocity.y += 350; // Jump Power
                    canJump = false;
                    break;
            }
        });

        document.addEventListener('keyup', function (event) {
            switch (event.code) {
                case 'ArrowUp':
                case 'KeyW': moveForward = false; break;
                case 'ArrowLeft':
                case 'KeyA': moveLeft = false; break;
                case 'ArrowDown':
                case 'KeyS': moveBackward = false; break;
                case 'ArrowRight':
                case 'KeyD': moveRight = false; break;
            }
        });

        // --- 6. GAME ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();

            if (controls.isLocked === true) {
                const delta = (time - prevTime) / 1000;

                // Physics & Friction
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 100.0 * delta; // Gravity (100.0 is the mass/scale multiplier)

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize(); // Ensures diagonal movement isn't faster

                // Walking Speed Acceleration
                const speed = 400.0; 
                if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

                // Apply Movement
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                controls.getObject().position.y += (velocity.y * delta);

                // Floor Collision
                if (controls.getObject().position.y < 10) {
                    velocity.y = 0;
                    controls.getObject().position.y = 10; // Stops falling through the floor
                    canJump = true;
                }
            }

            prevTime = time;
            renderer.render(scene, camera);
        }

        // Handle Screen Resizing
        window.addEventListener('resize', function () {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start Game Loop
        animate();
    </script>
</body>
</html>
