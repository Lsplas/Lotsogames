<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabpack Factory Map</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; }
        #instructions {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: rgba(0,0,0,0.8); color: white; cursor: pointer; z-index: 10;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 8px; height: 8px; background-color: white; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 5;
            box-shadow: 0 0 5px black;
        }
        h1 { font-size: 48px; margin-bottom: 10px; color: #ffcc00; text-shadow: 2px 2px 0 #000; }
        p { font-size: 20px; text-align: center; line-height: 1.5; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="instructions">
        <h1>PLAYTIME FACTORY</h1>
        <p>Click to start playing<br/><br/>
        <b>W, A, S, D</b> = Move<br/>
        <b>SPACE</b> = Jump<br/>
        <b>LEFT CLICK</b> = Shoot Grabpack Wire<br/>
        <b>Mouse</b> = Look Around</p>
    </div>
    <div id="crosshair"></div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

        // --- 1. SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111); // Dark factory atmosphere
        scene.fog = new THREE.Fog(0x111111, 10, 300);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.y = 10;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- 2. LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2); // Dim ambient
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffaa00, 1, 200); // Yellow industrial light
        pointLight.position.set(0, 40, 0);
        pointLight.castShadow = true;
        scene.add(pointLight);

        // --- 3. BUILD THE FACTORY MAP ---
        const interactables = []; // Objects we can shoot at

        // Factory Floor
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x333333 }); // Dark metal
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);
        interactables.push(floor);

        // Factory Walls
        const wallMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
        const createWall = (w, h, d, x, y, z) => {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
            mesh.position.set(x, y, z);
            mesh.receiveShadow = true;
            mesh.castShadow = true;
            scene.add(mesh);
            interactables.push(mesh);
        };
        createWall(200, 50, 2, 0, 25, -100); // Front wall
        createWall(200, 50, 2, 0, 25, 100);  // Back wall
        createWall(2, 50, 200, -100, 25, 0); // Left wall
        createWall(2, 50, 200, 100, 25, 0);  // Right wall

        // --- 4. THE PUZZLE MECHANIC ---
        // The Big Security Door
        const doorGeo = new THREE.BoxGeometry(30, 40, 4);
        const doorMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
        const factoryDoor = new THREE.Mesh(doorGeo, doorMat);
        factoryDoor.position.set(0, 20, -98); // Positioned on the front wall
        scene.add(factoryDoor);
        interactables.push(factoryDoor);

        // The Puzzle Button
        const buttonGeo = new THREE.BoxGeometry(5, 5, 2);
        const buttonMat = new THREE.MeshLambertMaterial({ color: 0xff0000 }); // Red = Locked
        const puzzleButton = new THREE.Mesh(buttonGeo, buttonMat);
        puzzleButton.position.set(30, 15, -98); // Next to the door
        puzzleButton.name = "PuzzleButton"; // We use this name to check if we hit it
        scene.add(puzzleButton);
        interactables.push(puzzleButton);

        let doorOpening = false; // Tracks if the puzzle is solved

        // --- 5. LOAD THE TINKERCAD GRABPACK ---
        scene.add(camera);
        const mtlLoader = new MTLLoader();
        mtlLoader.load('obj.mtl', function (materials) {
            materials.preload();
            const objLoader = new OBJLoader();
            objLoader.setMaterials(materials);
            objLoader.load('tinker.obj', function (object) {
                object.scale.set(0.1, 0.1, 0.1); 
                object.position.set(3, -4, -8); 
                object.rotation.set(0, Math.PI, 0); 
                camera.add(object);
            });
        });

        // --- 6. SHOOTING THE GRABPACK ---
        const raycaster = new THREE.Raycaster();
        const centerScreen = new THREE.Vector2(0, 0); // Crosshair position

        document.addEventListener('mousedown', function(event) {
            if (!controls.isLocked) return;

            // 1. Raycast from camera center
            raycaster.setFromCamera(centerScreen, camera);
            const intersects = raycaster.intersectObjects(interactables);

            if (intersects.length > 0) {
                const hitPoint = intersects[0].point;
                const hitObject = intersects[0].object;

                // 2. Draw the Grabpack Wire
                const material = new THREE.LineBasicMaterial({ color: 0x00aaff, linewidth: 3 });
                const points = [];
                // Start the wire slightly below and to the right of the camera (simulating the hand)
                const startPoint = new THREE.Vector3(2, -2, -5);
                startPoint.applyMatrix4(camera.matrixWorld); 
                points.push(startPoint);
                points.push(hitPoint);

                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(geometry, material);
                scene.add(line);

                // Remove the wire after 0.2 seconds
                setTimeout(() => { scene.remove(line); }, 200);

                // 3. Check Puzzle Logic
                if (hitObject.name === "PuzzleButton") {
                    puzzleButton.material.color.setHex(0x00ff00); // Turn green
                    doorOpening = true; // Trigger door animation
                }
            }
        });

        // --- 7. PLAYER CONTROLS & PHYSICS ---
        const controls = new PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');

        instructions.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => instructions.style.display = 'none');
        controls.addEventListener('unlock', () => instructions.style.display = 'flex');

        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        document.addEventListener('keydown', (e) => {
            switch (e.code) {
                case 'ArrowUp': case 'KeyW': moveForward = true; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = true; break;
                case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                case 'ArrowRight': case 'KeyD': moveRight = true; break;
                case 'Space': if (canJump) velocity.y += 300; canJump = false; break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch (e.code) {
                case 'ArrowUp': case 'KeyW': moveForward = false; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = false; break;
                case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                case 'ArrowRight': case 'KeyD': moveRight = false; break;
            }
        });

        // --- 8. GAME ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();

            // Animate Puzzle Door
            if (doorOpening && factoryDoor.position.y < 60) {
                factoryDoor.position.y += 0.5; // Slide door up
            }

            if (controls.isLocked === true) {
                const delta = (time - prevTime) / 1000;

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 100.0 * delta; // Gravity

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                const speed = 400.0;
                if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                controls.getObject().position.y += (velocity.y * delta);

                // Floor collision limits
                if (controls.getObject().position.y < 10) {
                    velocity.y = 0;
                    controls.getObject().position.y = 10;
                    canJump = true;
                }

                // Simple wall boundaries so you don't fall off the map
                const pos = controls.getObject().position;
                if (pos.x < -95) pos.x = -95;
                if (pos.x > 95) pos.x = 95;
                if (pos.z < -95) pos.z = -95;
                if (pos.z > 95) pos.z = 95;
            }

            prevTime = time;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
