<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eaglercraft 0.3.0 | Full Lock</title>
    <style>
        /* Force the page to be empty and black */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* The Game Frame */
        #eagler-frame {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }

        /* Initial Overlay to trigger Fullscreen/Pointer Lock */
        #click-to-play {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #555;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #click-to-play:hover {
            color: #fff;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="click-to-play">
        <div class="spinner"></div>
        <h1>Click to Initialize 0.3.0</h1>
    </div>

    <iframe 
        id="eagler-frame" 
        src="https://eaglercraftz.pages.dev/javascript/builds/0.3.0/" 
        allow="autoplay; fullscreen; keyboard; gamepad; pointer-lock">
    </iframe>

    <script>
        const frame = document.getElementById('eagler-frame');
        const overlay = document.getElementById('click-to-play');

        overlay.addEventListener('click', () => {
            // 1. Enter Fullscreen
            if (frame.requestFullscreen) {
                frame.requestFullscreen();
            } else if (frame.webkitRequestFullscreen) {
                frame.webkitRequestFullscreen();
            }

            // 2. Lock Pointer (Crucial for Minecraft controls)
            if (frame.requestPointerLock) {
                frame.requestPointerLock();
            }

            // 3. Focus and Hide Overlay
            frame.focus();
            overlay.style.display = 'none';
        });

        // Safety: If you exit fullscreen and click back, re-focus the game
        window.addEventListener('click', () => {
            if (overlay.style.display === 'none') {
                frame.focus();
            }
        });
    </script>
</body>
</html>
