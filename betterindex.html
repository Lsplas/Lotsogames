<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eaglercraft Full Lock</title>
    <style>
        /* Remove all browser spacing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents scrolling */
            background-color: #000;
        }

        /* Make the game fill every pixel of the screen */
        #game-engine {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }

        /* Simple overlay that vanishes on first click */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            z-index: 999;
            cursor: pointer;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>CLICK TO START & LOCK GAME</h1>
    </div>

    <iframe 
        id="game-engine" 
        src="https://eaglercraftz.pages.dev/javascript/builds/0.2.0/" 
        allow="autoplay; padding-left; fullscreen; keyboard; gamepad; focus-without-user-activation">
    </iframe>

    <script>
        const frame = document.getElementById('game-engine');
        const overlay = document.getElementById('overlay');

        overlay.addEventListener('click', () => {
            // 1. Hide the overlay
            overlay.style.display = 'none';
            
            // 2. Request Fullscreen for the frame
            if (frame.requestFullscreen) {
                frame.requestFullscreen();
            } else if (frame.webkitRequestFullscreen) {
                frame.webkitRequestFullscreen();
            }

            // 3. Force Focus
            frame.focus();
        });

        // Keep the game focused if the user clicks away
        window.addEventListener('focus', () => {
            frame.focus();
        });
    </script>
</body>
</html>
